<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <title>Piecas naktis pie Klāva</title>
  <style>
    :root { --scene-brightness: 1; }
    body {
      margin: 0; background: #000; color: #0fdfaf;
      font-family: monospace; display: flex;
      justify-content: center; align-items: flex-start; padding-top: 20px;
    }
    #game { width: 960px; }
    #game, #start-screen, #congrats-screen, #super-win-screen, #death-screen {
      filter: brightness(var(--scene-brightness)); transition: filter 0.25s ease;
    }
    #language-panel {
      position: fixed; top: 14px; right: 14px; display: flex;
      align-items: center; gap: 8px; padding: 8px 10px;
      border: 1px solid #0fdfaf; background: rgba(0,0,0,0.88);
      z-index: 400; box-shadow: 0 0 16px rgba(15,223,175,0.25);
    }
    #language-label { font-size: 12px; letter-spacing: 1px; }
    #language-select {
      background: #001a14; border: 1px solid #0fdfaf; color: #0fdfaf;
      font-family: monospace; font-size: 12px; padding: 4px 8px; cursor: pointer;
    }
    #title { text-align: center; font-size: 20px; margin-bottom: 5px; }
    #hud { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 4px; }
    #screen {
      position: relative; width: 960px; height: 540px;
      border: 3px solid #0fdfaf; background: #000; overflow: hidden;
    }
    #office-bg {
      background-size: 100% 100%; background-position: center; background-repeat: no-repeat;
      position: absolute; inset: 0;
      background-image:
        radial-gradient(circle at 50% 18%, rgba(210,220,235,0.14) 0 8%, transparent 12%),
        linear-gradient(90deg, #0a0d12 0 16%, #252b33 16% 34%, #0d1116 34% 66%, #252b33 66% 84%, #0a0d12 84% 100%),
        linear-gradient(180deg, transparent 0 70%, #050608 70% 100%),
        linear-gradient(180deg, #161b22 0%, #050607 100%);
      z-index: 1; filter: contrast(1.04) saturate(0.9);
    }
    #office-bg::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,244,214,0.08) 0 6%, transparent 18%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 120px),
        linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 18%, transparent 84%, rgba(0,0,0,0.28) 100%);
      pointer-events: none; opacity: 0.72;
    }
    #office-bg::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 56%, transparent 0 26%, rgba(0,0,0,0.18) 72%, rgba(0,0,0,0.48) 100%);
      pointer-events: none;
    }
    .room-bg {
      position: absolute; inset: 0; background-size: 100% 100%;
      background-position: center; background-repeat: no-repeat;
      display: none; z-index: 2; filter: brightness(1.3);
    }
    .room-bg.active { display: block; }
    #bg-0 { background-image: radial-gradient(circle at 50% 18%, rgba(220,230,245,0.16) 0 7%, transparent 11%), linear-gradient(90deg, #07090d 0 18%, #2b3139 18% 30%, #101318 30% 70%, #2b3139 70% 82%, #07090d 82% 100%), linear-gradient(180deg, transparent 0 72%, #040507 72% 100%), linear-gradient(180deg, #151b22 0%, #050607 100%); }
    #bg-1 { background-image: linear-gradient(180deg, #232730 0 56%, #111419 56% 100%), repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0 26px, rgba(0,0,0,0.05) 26px 52px), repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0 26px, rgba(0,0,0,0.03) 26px 52px), linear-gradient(180deg, transparent 0 66%, #050608 66% 100%); }
    #bg-2 { background-image: linear-gradient(180deg, #4e5863 0 42%, #252b33 42% 62%, #08090b 62% 100%), linear-gradient(90deg, rgba(255,255,255,0.1) 0 12%, transparent 12% 88%, rgba(255,255,255,0.1) 88% 100%), radial-gradient(circle at 74% 22%, rgba(255,255,255,0.14) 0 9%, transparent 12%); }
    #bg-3 { background-image: linear-gradient(180deg, #2c2125 0 48%, #0f1014 48% 100%), radial-gradient(circle at 26% 30%, rgba(255,220,170,0.16) 0 8%, transparent 12%), radial-gradient(circle at 74% 30%, rgba(255,220,170,0.16) 0 8%, transparent 12%), linear-gradient(90deg, rgba(100,24,28,0.5) 0 18%, transparent 18% 82%, rgba(100,24,28,0.5) 82% 100%); }
    #bg-4 { background-image: linear-gradient(180deg, #171b22 0 44%, #0b0d11 44% 100%), linear-gradient(90deg, #0a0c10 0 22%, #20262e 22% 38%, #0f1217 38% 62%, #20262e 62% 78%, #0a0c10 78% 100%), radial-gradient(circle at 50% 22%, rgba(220,230,245,0.12) 0 8%, transparent 11%); }
    #bg-5 { background-image: linear-gradient(90deg, #06080c 0 16%, #2a3038 16% 28%, #0f1319 28% 72%, #2a3038 72% 84%, #06080c 84% 100%), linear-gradient(180deg, transparent 0 70%, #050608 70% 100%), radial-gradient(circle at 30% 18%, rgba(220,230,245,0.1) 0 7%, transparent 12%); }
    #bg-6 { background-image: linear-gradient(90deg, #06080c 0 16%, #323942 16% 30%, #11151b 30% 70%, #323942 70% 84%, #06080c 84% 100%), linear-gradient(180deg, transparent 0 70%, #050608 70% 100%), radial-gradient(circle at 70% 18%, rgba(220,230,245,0.1) 0 7%, transparent 12%); }
    #bg-7 { background-image: linear-gradient(180deg, #20252e 0 52%, #0d0f13 52% 100%), linear-gradient(90deg, rgba(255,255,255,0.06) 0 10%, transparent 10% 90%, rgba(255,255,255,0.06) 90% 100%), radial-gradient(circle at 60% 24%, rgba(220,230,245,0.12) 0 7%, transparent 10%); }
    #bg-8 { background-image: linear-gradient(180deg, #1c2018 0 46%, #0b0c0d 46% 100%), radial-gradient(circle at 52% 30%, rgba(120,180,95,0.18) 0 10%, transparent 15%), linear-gradient(90deg, rgba(40,55,30,0.55) 0 18%, transparent 18% 82%, rgba(40,55,30,0.55) 82% 100%); }
    #bg-9 { background-image: radial-gradient(circle at 50% 18%, rgba(210,220,235,0.14) 0 8%, transparent 12%), linear-gradient(90deg, #0a0d12 0 16%, #252b33 16% 34%, #0d1116 34% 66%, #252b33 66% 84%, #0a0d12 84% 100%), linear-gradient(180deg, transparent 0 70%, #050608 70% 100%), linear-gradient(180deg, #161b22 0%, #050607 100%); }
    #klavs-figure {
      position: absolute; width: 120px; height: 220px; background: #0fdfaf; opacity: 0.8;
      left: 50%; top: 55%; transform: translate(-50%, -50%); display: none; z-index: 3;
    }
    #camera-overlay {
      position: absolute; right: 14px; bottom: 14px; width: 320px;
      max-width: calc(100% - 28px);
      background: linear-gradient(180deg, rgba(0,0,0,0.96) 0%, rgba(0,26,20,0.94) 100%);
      border: 2px solid #0fdfaf; border-radius: 8px; display: block; z-index: 6;
      padding: 10px; overflow: hidden; box-sizing: border-box;
      box-shadow: 0 0 24px rgba(15,223,175,0.45);
      opacity: 0; visibility: hidden; pointer-events: none;
      transform: translate(88px, 56px) scale(0.62) rotate(-9deg);
      transform-origin: bottom right;
      transition: opacity 180ms ease, transform 340ms cubic-bezier(0.18,0.9,0.24,1.2), visibility 0s linear 340ms;
      will-change: transform, opacity;
    }
    #camera-overlay.open {
      opacity: 1; visibility: visible; pointer-events: auto;
      transform: translate(0,0) scale(1) rotate(0deg);
      transition: opacity 180ms ease, transform 340ms cubic-bezier(0.16,1,0.3,1), visibility 0s linear 0s;
    }
    #camera-feed {
      position: relative; height: 170px; margin-bottom: 10px;
      border: 2px solid #0fdfaf; background: #000; overflow: hidden;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.85);
      transform: translateY(16px) scale(0.97);
      transition: transform 340ms cubic-bezier(0.16,1,0.3,1);
    }
    #camera-feed-bg {
      position: absolute; inset: 0; background-size: cover;
      background-position: center; background-repeat: no-repeat;
      filter: brightness(1.02) contrast(1.14) saturate(0.82); transform: scale(1.025);
    }
    #camera-feed::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, rgba(255,255,255,0.08) 0 1px, transparent 1px 3px),
        linear-gradient(180deg, rgba(140,180,255,0.03) 0%, transparent 30%, rgba(0,0,0,0.08) 100%);
      mix-blend-mode: screen; opacity: 0.22; pointer-events: none; z-index: 1;
      animation: scanlines 7s linear infinite;
    }
    #camera-feed::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 48%, transparent 0 28%, rgba(0,0,0,0.16) 68%, rgba(0,0,0,0.58) 100%),
        linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 12%, transparent 66%, rgba(0,0,0,0.42) 100%);
      pointer-events: none; z-index: 2;
    }
    #camera-feed-klavs {
      position: absolute; left: 50%; bottom: 12px; width: 70px; height: 130px;
      background: rgba(15,223,175,0.82); box-shadow: 0 0 18px rgba(15,223,175,0.55);
      transform: translateX(-50%); display: none; z-index: 3;
    }
    #camera-map-fnaf {
      position: relative; width: 280px; max-width: 100%; height: 200px; margin: 0 auto;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
      border: 2px solid #0fdfaf; border-radius: 6px;
      box-shadow: 0 0 30px #0fdfaf, inset 0 0 20px rgba(0,0,0,0.8);
      z-index: 10; overflow: visible;
      transform: translateY(22px); transition: transform 340ms cubic-bezier(0.16,1,0.3,1);
    }
    #camera-overlay.open #camera-feed, #camera-overlay.open #camera-map-fnaf {
      transform: translateY(0) scale(1);
    }
    #camera-map-fnaf::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, rgba(15,223,175,0.02) 0px, rgba(15,223,175,0.02) 1px, transparent 1px, transparent 2px),
        repeating-linear-gradient(90deg, rgba(15,223,175,0.02) 0px, rgba(15,223,175,0.02) 1px, transparent 1px, transparent 2px);
      pointer-events: none; z-index: 0;
    }
    #camera-map-fnaf::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 40%, rgba(15,223,175,0.1) 0%, transparent 50%);
      pointer-events: none; z-index: 1;
    }
    #camera-lines { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
    .fnaf-cam-btn {
      position: absolute; width: 50px; height: 38px; background: #1a1a1a;
      border: 1px solid #333; color: #fff; font-family: monospace; font-size: 10px;
      font-weight: bold; padding: 0; cursor: pointer; transition: all 0.2s; outline: none;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 6px rgba(0,0,0,0.8), inset 0 0 3px rgba(0,0,0,0.5); z-index: 2;
    }
    .fnaf-cam-btn:hover { border-color: #0fdfaf; box-shadow: 0 0 12px rgba(15,223,175,0.4), inset 0 0 4px rgba(0,0,0,0.5); background: #222; }
    .fnaf-cam-btn.selected { background: #0fdfaf; color: #000; border-color: #0fdfaf; box-shadow: 0 0 20px #0fdfaf, inset 0 0 8px rgba(255,255,255,0.3); font-weight: bold; z-index: 3; }
    .fnaf-cam-btn[data-cam="0"] { top: 145px; left: 12px; }
    .fnaf-cam-btn[data-cam="1"] { top: 145px; left: 64px; }
    .fnaf-cam-btn[data-cam="2"] { top: 145px; left: 116px; }
    .fnaf-cam-btn[data-cam="3"] { top: 145px; left: 168px; }
    .fnaf-cam-btn[data-cam="4"] { top: 95px; left: 115px; }
    .fnaf-cam-btn[data-cam="5"] { top: 110px; left: 12px; }
    .fnaf-cam-btn[data-cam="6"] { top: 110px; left: 218px; }
    .fnaf-cam-btn[data-cam="7"] { top: 110px; left: 64px; }
    .fnaf-cam-btn[data-cam="8"] { top: 110px; left: 168px; }
    .fnaf-cam-btn[data-cam="9"] { top: 68px; left: 115px; }
    #camera-label {
      position: absolute; top: 10px; left: 10px; padding: 4px 8px;
      border: 1px solid #0fdfaf; background: rgba(0,0,0,0.8); font-size: 12px; z-index: 4;
    }
    #camera-static {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(transparent 0px, transparent 2px, rgba(15,223,175,0.25) 3px);
      opacity: 0.12; pointer-events: none; z-index: 3;
    }
    #screen-text {
      position: absolute; bottom: 10px; left: 10px; padding: 4px 8px;
      background: rgba(0,0,0,0.8); border: 1px solid #0fdfaf;
      max-width: 60%; font-size: 13px; z-index: 5;
    }
    #controls { margin-top: 6px; display: flex; gap: 8px; }
    #controls button {
      background: #001a14; border: 1px solid #0fdfaf; color: #0fdfaf;
      padding: 6px 12px; cursor: pointer; font-family: monospace; font-size: 13px;
    }
    #controls button:hover { background: #003326; }
    #btn-admin { display: none; }
    #log { margin-top: 6px; height: 120px; border: 1px solid #0fdfaf; padding: 4px; overflow-y: auto; font-size: 11px; }

    /* Congrats */
    #congrats-screen {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, rgba(0,0,0,0.95) 0%, rgba(15,150,100,0.2) 50%, rgba(0,0,0,0.95) 100%);
      display: none; align-items: center; justify-content: center; z-index: 100;
      animation: waveBackground 3s ease-in-out infinite;
    }
    @keyframes waveBackground {
      0%,100% { background: linear-gradient(135deg, rgba(0,0,0,0.95) 0%, rgba(15,150,100,0.2) 50%, rgba(0,0,0,0.95) 100%); }
      50% { background: linear-gradient(135deg, rgba(0,0,0,0.95) 0%, rgba(15,200,150,0.3) 50%, rgba(0,0,0,0.95) 100%); }
    }
    @keyframes starsSparkle { 0%,100% { opacity:0.3; } 50% { opacity:1; } }
    #congrats-screen::before, #congrats-screen::after {
      content: '★'; position: fixed; font-size: 60px; color: #0fdfaf;
      animation: starsSparkle 1.5s ease-in-out infinite; pointer-events: none;
      text-shadow: 0 0 10px #0fdfaf;
    }
    #congrats-screen::before { top:10%; left:10%; animation-delay:0s; }
    #congrats-screen::after { top:10%; right:10%; animation-delay:0.5s; }
    #congrats-box {
      background: linear-gradient(135deg, #001a14 0%, #002a20 100%);
      border: 4px solid #0fdfaf; padding: 50px 60px; text-align: center;
      box-shadow: 0 0 40px #0fdfaf, inset 0 0 30px rgba(15,223,175,0.1);
      animation: congratsScale 0.8s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes congratsScale {
      from { transform: scale(0) rotateZ(-10deg); opacity: 0; }
      to { transform: scale(1) rotateZ(0deg); opacity: 1; }
    }
    #congrats-title {
      font-size: 48px; margin-bottom: 15px; text-shadow: 0 0 20px #0fdfaf, 0 0 40px #0fdfaf;
      color: #0fdfaf; letter-spacing: 2px; font-weight: bold;
      animation: titlePulseWin 2s ease-in-out infinite;
    }
    @keyframes titlePulseWin {
      0%,100% { text-shadow: 0 0 20px #0fdfaf, 0 0 40px #0fdfaf; transform: scale(1); }
      50% { text-shadow: 0 0 30px #0fdfaf, 0 0 60px #0fdfaf; transform: scale(1.05); }
    }
    #congrats-text { font-size: 22px; margin-bottom: 30px; color: #0fdfaf; opacity: 0.9; line-height: 1.6; animation: textFadeIn 1s ease-out 0.3s both; }
    @keyframes textFadeIn {
      from { opacity:0; transform: translateY(20px); }
      to { opacity:0.9; transform: translateY(0); }
    }
    #btn-next-night {
      background: linear-gradient(135deg, transparent 0%, rgba(15,223,175,0.1) 100%);
      border: 3px solid #0fdfaf; color: #0fdfaf; padding: 15px 50px; font-size: 20px;
      cursor: pointer; font-family: monospace; font-weight: bold; letter-spacing: 2px;
      transition: all 0.3s ease; box-shadow: 0 0 15px #0fdfaf;
      animation: buttonPulseWin 2s ease-in-out infinite 0.6s;
    }
    @keyframes buttonPulseWin {
      0%,100% { box-shadow: 0 0 15px #0fdfaf; transform: scale(1); }
      50% { box-shadow: 0 0 30px #0fdfaf, inset 0 0 10px rgba(15,223,175,0.3); transform: scale(1.03); }
    }
    #btn-next-night:hover { background: rgba(15,223,175,0.15); box-shadow: 0 0 40px #0fdfaf, inset 0 0 20px rgba(15,223,175,0.3); transform: scale(1.08); }
    #btn-next-night:active { transform: scale(0.95); }

    /* Super Win */
    @keyframes superWinScale {
      0% { transform: scale(0) rotateZ(-20deg); opacity:0; }
      50% { transform: scale(1.1) rotateZ(5deg); }
      100% { transform: scale(1) rotateZ(0deg); opacity:1; }
    }
    @keyframes rainbowGlow {
      0% { text-shadow: 0 0 20px #f00, 0 0 40px #f00; color: #f00; }
      16% { color: #f70; }
      32% { color: #ff0; }
      48% { color: #0f0; }
      64% { color: #00f; }
      80% { color: #f0f; }
      100% { text-shadow: 0 0 20px #0fdfaf, 0 0 40px #0fdfaf; color: #0fdfaf; }
    }
    @keyframes superPulse {
      0%,100% { transform:scale(1); text-shadow: 0 0 30px #0fdfaf, 0 0 60px #0fdfaf; }
      50% { transform:scale(1.08); text-shadow: 0 0 50px #0fdfaf, 0 0 100px #0fdfaf; }
    }
    #super-win-screen {
      position: fixed; inset: 0;
      background: linear-gradient(45deg, #000, #001a14, #000033, #001a14, #000);
      display: none; align-items: center; justify-content: center; z-index: 999; overflow: hidden;
    }
    #super-win-content { position:relative; z-index:2; text-align:center; animation: superWinScale 1s cubic-bezier(0.34,1.56,0.64,1); }
    #super-win-title { font-size:80px; font-weight:bold; letter-spacing:4px; animation: rainbowGlow 3s ease-in-out infinite, superPulse 2s ease-in-out infinite; margin-bottom:20px; text-transform:uppercase; }
    #super-win-subtitle { font-size:36px; color:#0fdfaf; margin-bottom:30px; text-shadow: 0 0 20px #0fdfaf; animation: titlePulseWin 2s ease-in-out infinite; letter-spacing:2px; }
    #super-win-message { font-size:20px; color:#0fdfaf; max-width:600px; margin-bottom:40px; line-height:2; opacity:0.95; animation: textFadeIn 1s ease-out 0.5s both; }
    #super-win-actions { display:flex; justify-content:center; gap:16px; flex-wrap:wrap; }
    #btn-replay, #btn-super-back-to-start {
      background: linear-gradient(135deg, rgba(15,223,175,0.2), rgba(15,223,175,0.05));
      border: 4px solid #0fdfaf; color: #0fdfaf; padding: 20px 60px; font-size: 24px;
      cursor: pointer; font-family: monospace; font-weight: bold; letter-spacing: 3px;
      transition: all 0.3s ease; box-shadow: 0 0 30px #0fdfaf; text-transform: uppercase;
    }
    #btn-super-back-to-start { border-color: #7ae9ff; color: #7ae9ff; box-shadow: 0 0 24px rgba(122,233,255,0.7); }
    #btn-replay:hover, #btn-super-back-to-start:hover { background: rgba(15,223,175,0.2); box-shadow: 0 0 60px #0fdfaf, inset 0 0 30px rgba(15,223,175,0.4); transform: scale(1.1); }
    #btn-replay:active, #btn-super-back-to-start:active { transform: scale(0.9); }

    /* Start Screen */
    @keyframes titleGlow {
      0%,100% { text-shadow: 0 0 10px #0fdfaf, 0 0 20px #0fdfaf; }
      50% { text-shadow: 0 0 20px #0fdfaf, 0 0 40px #0fdfaf, 0 0 60px #0fdfaf; }
    }
    @keyframes fadeInUp {
      from { opacity:0; transform: translateY(30px); }
      to { opacity:1; transform: translateY(0); }
    }
    @keyframes buttonPulse {
      0%,100% { box-shadow: 0 0 10px #0fdfaf, inset 0 0 10px rgba(15,223,175,0.2); }
      50% { box-shadow: 0 0 30px #0fdfaf, inset 0 0 20px rgba(15,223,175,0.4); }
    }
    @keyframes scanlines {
      0% { transform: translateY(0); }
      100% { transform: translateY(10px); }
    }
    #start-screen {
      position: fixed; inset: 0; background: linear-gradient(135deg, #000 0%, #001a14 50%, #000 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 300; overflow: hidden;
    }
    #start-screen::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, rgba(15,223,175,0.03) 0px, rgba(15,223,175,0.03) 1px, transparent 1px, transparent 2px);
      animation: scanlines 8s linear infinite; pointer-events: none;
    }
    #start-content { position:relative; z-index:1; text-align:center; }
    #start-title { font-size:64px; font-weight:bold; color:#0fdfaf; margin-bottom:10px; letter-spacing:3px; animation: titleGlow 3s ease-in-out infinite, fadeInUp 1s ease-out; text-shadow: 0 0 15px #0fdfaf; }
    #start-subtitle { font-size:24px; color:#0fdfaf; margin-bottom:40px; opacity:0.8; animation: fadeInUp 1s ease-out 0.3s both; letter-spacing:2px; }
    #start-text { font-size:14px; color:#0fdfaf; max-width:500px; line-height:1.8; margin-bottom:50px; margin-left:50px; opacity:0.7; animation: fadeInUp 1s ease-out 0.6s both; }
    #start-actions { display:flex; justify-content:center; gap:14px; flex-wrap:wrap; }
    #btn-start, #btn-bonus-shift, #btn-nightmare-shift, #btn-how-to, #btn-settings, #btn-how-to-close, #btn-settings-close {
      background: transparent; border: 2px solid #0fdfaf; color: #0fdfaf; padding: 15px 40px;
      font-size: 20px; cursor: pointer; font-family: monospace; font-weight: bold;
      transition: all 0.3s ease; letter-spacing: 2px;
      animation: fadeInUp 1s ease-out 0.9s both, buttonPulse 2s ease-in-out 1.9s infinite;
    }
    #btn-bonus-shift { display:none; border-color:#ffd166; color:#ffd166; box-shadow: 0 0 18px rgba(255,209,102,0.24); }
    #btn-nightmare-shift { display:none; border-color:#ff6b6b; color:#ff8f8f; box-shadow: 0 0 18px rgba(255,107,107,0.24); }

// ===== SETTINGS & STATE =====
const SETTINGS_KEY = "pnpk-settings";
const BONUS_KEY = "pnpk-bonus-shift-unlocked";
const NIGHTMARE_KEY = "pnpk-nightmare-shift-unlocked";

let currentLang = "lv";
let settings = { lang: "lv", volume: 70, brightness: 100, effects: "normal" };

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY));
    if (s) settings = Object.assign(settings, s);
  } catch(e) {}
  currentLang = settings.lang || "lv";
}

function saveSettings() {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); } catch(e) {}
}

function t(key, ...args) {
  const lang = TRANSLATIONS[currentLang] || TRANSLATIONS.lv;
  const val = lang[key] !== undefined ? lang[key] : (TRANSLATIONS.lv[key] || key);
  return typeof val === "function" ? val(...args) : val;
}

// ===== APPLY TRANSLATIONS TO DOM =====

  document.title = t("pageTitle");
  document.getElementById("start-title").textContent = t("startTitle");
  document.getElementById("start-subtitle").textContent = t("startSubtitle");

  document.getElementById("how-to-text").innerHTML = t("howToText");
  document.getElementById("btn-how-to-close").textContent = t("btnClose");
  document.getElementById("settings-title").textContent = t("settingsTitle");
  document.getElementById("settings-language-label").textContent = t("settingsLanguage");
  document.getElementById("settings-volume-label").textContent = t("settingsVolume");
  document.getElementById("settings-brightness-label").textContent = t("settingsBrightness");
  document.getElementById("settings-effects-label").textContent = t("settingsEffects");
  document.getElementById("settings-effects-low").textContent = t("settingsEffectsLow");
  document.getElementById("settings-effects-normal").textContent = t("settingsEffectsNormal");
  document.getElementById("settings-effects-high").textContent = t("settingsEffectsHigh");
  document.getElementById("settings-note").textContent = t("settingsNote");
  document.getElementById("btn-settings-close").textContent = t("btnClose");
  document.getElementById("hud-night-label").textContent = t("hudNight");
  document.getElementById("hud-time-label").textContent = t("hudTime");
  document.getElementById("hud-power-label").textContent = t("hudPower");
  document.getElementById("btn-light").textContent = t("btnLight");
  document.getElementById("btn-door").textContent = doorClosed ? t("btnDoorClosed") : t("btnDoorOpen");

function setLanguage(lang) {
  if (!TRANSLATIONS[lang]) return;
  currentLang = lang;
  settings.lang = lang;
  saveSettings();
  applyTranslations();
}

// ===== GAME STATE =====
let night = 1;
let seconds = 0;
let power = 100;
let gameOver = false;
let timer = null;
let cameraOn = false;
let doorClosed = false;
let lightsOn = false;
let klavsRoom = 0;
let currentCameraRoom = 9;
let klavsCooldown = 0;
let klavsMoveTimer = 0;
let klavsDoorTimer = 0;
let klavsMovePressure = 0;
let klavsKillIntent = 0;
let infinitePowerEnabled = false;
let freezeKlavsEnabled = false;

const pathToOffice = [0,1,2,3,5,6,9];
const NIGHT_DURATION = 360; // 6 minutes per night
const POWER_DRAIN_BASE = 0.02;

// ===== DOM REFS =====
const elNight = document.getElementById("night");
const elTime = document.getElementById("time");
const elPower = document.getElementById("power");
const elLog = document.getElementById("log");
const elScreenText = document.getElementById("screen-text");
const elCameraOverlay = document.getElementById("camera-overlay");
const elKlavsFigure = document.getElementById("klavs-figure");
const elCameraFeedKlavs = document.getElementById("camera-feed-klavs");
const elCameraLabel = document.getElementById("camera-label");

// ===== LOGGING =====
function addLog(msg) {
  const d = document.createElement("div");
  const m = Math.floor(seconds/60).toString().padStart(2,"0");
  const s = (seconds%60).toString().padStart(2,"0");
  d.textContent = `[${m}:${s}] ${msg}`;
  elLog.prepend(d);
  while (elLog.children.length > 60) elLog.removeChild(elLog.lastChild);
}

// ===== DISPLAY =====
function updateHUD() {
  elNight.textContent = night;
  const m = Math.floor(seconds/60).toString().padStart(2,"0");
  const s = (seconds%60).toString().padStart(2,"0");
  elTime.textContent = `${m}:${s}`;
  elPower.textContent = Math.max(0, Math.floor(power)) + "%";
}

function updateRoomDisplay() {
  document.querySelectorAll(".room-bg").forEach(el => el.classList.remove("active"));
  if (cameraOn) {
    const bg = document.getElementById(`bg-${currentCameraRoom}`);
    if (bg) bg.classList.add("active");
    elCameraFeedKlavs.style.display = (klavsRoom === currentCameraRoom) ? "block" : "none";
    elCameraLabel.textContent = `CAM ${currentCameraRoom + 1}`;
  }
  elKlavsFigure.style.display = (!cameraOn && klavsRoom === 9) ? "block" : "none";
}

function updateCameraButtons() {
  document.querySelectorAll(".fnaf-cam-btn").forEach(btn => {
    btn.classList.toggle("selected", parseInt(btn.dataset.cam) === currentCameraRoom);
  });
}

// ===== CAMERA =====
function toggleCamera() {
  if (gameOver) return;
  cameraOn = !cameraOn;
  elCameraOverlay.classList.toggle("open", cameraOn);
  if (cameraOn) {
    addLog(t("logCamera"));
    updateRoomDisplay();
    updateCameraButtons();
  } else {
    addLog(t("logCameraOff"));
    updateRoomDisplay();
  }
}

function switchCamera(roomNum) {
  currentCameraRoom = roomNum;
  updateRoomDisplay();
  updateCameraButtons();
}

// ===== DOOR =====
function toggleDoor() {
  if (gameOver) return;
  doorClosed = !doorClosed;
  document.getElementById("btn-door").textContent = doorClosed ? t("btnDoorClosed") : t("btnDoorOpen");
  addLog(doorClosed ? t("logDoorClosed") : t("logDoorOpen"));
}

// ===== LIGHT =====
function toggleLight() {
  if (gameOver) return;
  lightsOn = !lightsOn;
  document.documentElement.style.setProperty("--scene-brightness", lightsOn ? "1.5" : "1");
  addLog(lightsOn ? t("logLight") : t("logLightOff"));
}

// ===== SCREAM =====
function doScream() {
  if (gameOver) return;
  addLog(t("logScream"));
  if (klavsRoom === 9 || klavsRoom === 6 || klavsRoom === 5) {
    klavsRoom = 0;
    klavsMovePressure = Math.max(0, klavsMovePressure - 20);
    addLog(t("logKlavsMoved", 0));
    updateRoomDisplay();
  }
}

// ===== KLAVS AI =====
function klavsMove() {
  if (freezeKlavsEnabled) return;
  if (klavsCooldown > 0) { klavsCooldown--; return; }

  klavsMovePressure += 0.5 + (night * 0.3);
  const moveChance = Math.min(0.9, klavsMovePressure / 100);

  if (Math.random() < moveChance) {
    klavsMovePressure = 0;
    const idx = pathToOffice.indexOf(klavsRoom);
    if (idx >= 0 && idx < pathToOffice.length - 1) {
      klavsRoom = pathToOffice[idx + 1];
      addLog(t("logKlavsMoved", klavsRoom));
      if (cameraOn && currentCameraRoom === klavsRoom) {
        addLog(t("logKlavsSpotted", klavsRoom + 1));
      }
      updateRoomDisplay();
      klavsCooldown = Math.max(1, 8 - night);
    }
  }

  // At the door (room 9)
  if (klavsRoom === 9) {
    klavsDoorTimer++;
    if (doorClosed) {
      addLog(t("logKlavsBlocked"));
      klavsDoorTimer = 0;
      klavsRoom = Math.max(0, pathToOffice[Math.floor(Math.random() * 4)]);
      klavsMovePressure = 0;
      updateRoomDisplay();
    } else if (klavsDoorTimer >= (6 - night)) {
      triggerDeath();
    }
  } else {
    klavsDoorTimer = 0;
  }
}

// ===== POWER =====
function drainPower() {
  if (infinitePowerEnabled) return;
  let drain = POWER_DRAIN_BASE;
  if (cameraOn) drain += 0.04;
  if (doorClosed) drain += 0.06;
  if (lightsOn) drain += 0.04;
  power -= drain;
  if (power <= 0) {
    power = 0;
    triggerPowerOut();
  }
}

function triggerPowerOut() {
  if (gameOver) return;
  gameOver = true;
  clearInterval(timer);
  cameraOn = false;
  elCameraOverlay.classList.remove("open");
  elScreenText.textContent = t("powerOutMsg");
  setTimeout(() => triggerDeath(), 3000);
}

// ===== DEATH =====
function triggerDeath() {
  if (gameOver && document.getElementById("death-screen").style.display === "flex") return;
  gameOver = true;
  clearInterval(timer);

  const effectLevel = settings.effects || "normal";
  const jumpscare = document.getElementById("jumpscare");

  if (effectLevel !== "low") {
    jumpscare.style.display = "flex";
    const duration = effectLevel === "high" ? 2500 : 1500;
    setTimeout(() => {
      jumpscare.style.display = "none";
      showDeathScreen();
    }, duration);
  } else {
    showDeathScreen();
  }
}

function showDeathScreen() {
  document.getElementById("death-message").textContent = t("deathMessage");
  document.getElementById("death-screen").style.display = "flex";
}

// ===== WIN =====
function nightWin() {
  gameOver = true;
  clearInterval(timer);
  if (night >= 5) {
    showSuperWin();
  } else {
    document.getElementById("congrats-text").textContent = t("congratsText");
    document.getElementById("btn-next-night").textContent = t("btnNextNight");
    document.getElementById("congrats-screen").style.display = "flex";
  }
}

function showSuperWin() {
  document.getElementById("super-win-title").textContent = t("superWinTitle");
  document.getElementById("super-win-subtitle").textContent = t("superWinSubtitle");
  document.getElementById("super-win-message").textContent = t("superWinMessage");
  document.getElementById("btn-replay").textContent = t("btnReplay");
  document.getElementById("btn-super-back-to-start").textContent = t("btnBackToStart");
  document.getElementById("super-win-screen").style.display = "flex";
  try { localStorage.setItem(BONUS_KEY, "1"); localStorage.setItem(NIGHTMARE_KEY, "1"); } catch(e) {}
}

// ===== GAME LOOP =====
function gameTick() {
  seconds++;
  updateHUD();
  drainPower();
  klavsMoveTimer++;
  if (klavsMoveTimer >= 3) { klavsMoveTimer = 0; klavsMove(); }
  if (seconds >= NIGHT_DURATION) nightWin();
}

// ===== START GAME =====
function startGame(nightNum) {
  night = nightNum || 1;
  seconds = 0;
  power = 100;
  gameOver = false;
  cameraOn = false;
  doorClosed = false;
  lightsOn = false;
  klavsRoom = 0;
  currentCameraRoom = 9;
  klavsCooldown = 0;
  klavsMoveTimer = 0;
  klavsDoorTimer = 0;
  klavsMovePressure = 0;
  infinitePowerEnabled = false;
  freezeKlavsEnabled = false;
  elCameraOverlay.classList.remove("open");
  elKlavsFigure.style.display = "none";
  elScreenText.textContent = t("nightLabel", night);
  elLog.innerHTML = "";
  document.getElementById("btn-door").textContent = t("btnDoorOpen");
  document.documentElement.style.setProperty("--scene-brightness", "1");
  document.querySelectorAll(".room-bg").forEach(el => el.classList.remove("active"));
  updateHUD();
  clearInterval(timer);
  timer = setInterval(gameTick, 1000);
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("congrats-screen").style.display = "none";
  document.getElementById("super-win-screen").style.display = "none";
  document.getElementById("death-screen").style.display = "none";
}

function restartCurrentNight() {
  document.getElementById("death-screen").style.display = "none";
  startGame(night);
}

function goToStart() {
  clearInterval(timer);
  gameOver = true;
  document.getElementById("death-screen").style.display = "none";
  document.getElementById("congrats-screen").style.display = "none";
  document.getElementById("super-win-screen").style.display = "none";
  document.getElementById("start-screen").style.display = "flex";
  checkUnlocks();
}

function checkUnlocks() {
  try {
    const bonus = localStorage.getItem(BONUS_KEY);
    const nightmare = localStorage.getItem(NIGHTMARE_KEY);
    document.getElementById("btn-bonus-shift").style.display = bonus ? "inline-block" : "none";
    document.getElementById("btn-nightmare-shift").style.display = nightmare ? "inline-block" : "none";
  } catch(e) {}
}

// ===== APPLY SETTINGS UI =====
function applyBrightnessSetting(val) {
  const pct = val / 100;
  document.documentElement.style.setProperty("--scene-brightness", pct);
}

// ===== WIRE UP EVENTS =====
// Language selectors — both stay in sync
document.getElementById("language-select").addEventListener("change", e => setLanguage(e.target.value));
document.getElementById("settings-language-select").addEventListener("change", e => setLanguage(e.target.value));

// Game controls
document.getElementById("btn-camera").addEventListener("click", toggleCamera);
document.getElementById("btn-door").addEventListener("click", toggleDoor);
document.getElementById("btn-light").addEventListener("click", toggleLight);
document.getElementById("btn-scream").addEventListener("click", doScream);
document.getElementById("btn-restart").addEventListener("click", restartCurrentNight);

// Camera buttons
document.querySelectorAll(".fnaf-cam-btn").forEach(btn => {
  btn.addEventListener("click", () => switchCamera(parseInt(btn.dataset.cam)));
});

// Start screen
document.getElementById("btn-start").addEventListener("click", () => startGame(1));
document.getElementById("btn-bonus-shift").addEventListener("click", () => startGame(6));
document.getElementById("btn-nightmare-shift").addEventListener("click", () => { night = 1; startGame(1); });

// How to play
document.getElementById("btn-how-to").addEventListener("click", () => {
  document.getElementById("how-to-modal").classList.add("open");
});
document.getElementById("btn-how-to-close").addEventListener("click", () => {
  document.getElementById("how-to-modal").classList.remove("open");
});

// Settings modal
document.getElementById("btn-settings").addEventListener("click", () => {
  document.getElementById("settings-modal").classList.add("open");
});
document.getElementById("btn-settings-close").addEventListener("click", () => {
  document.getElementById("settings-modal").classList.remove("open");
});

// Volume
document.getElementById("settings-volume").addEventListener("input", e => {
  settings.volume = parseInt(e.target.value);
  document.getElementById("settings-volume-value").textContent = settings.volume + "%";
  saveSettings();
});

// Brightness
document.getElementById("settings-brightness").addEventListener("input", e => {
  settings.brightness = parseInt(e.target.value);
  document.getElementById("settings-brightness-value").textContent = settings.brightness + "%";
  applyBrightnessSetting(settings.brightness);
  saveSettings();
});

// Effects
document.getElementById("settings-effects-select").addEventListener("change", e => {
  settings.effects = e.target.value;
  saveSettings();
});

// Congrats / death / win buttons
document.getElementById("btn-next-night").addEventListener("click", () => {
  document.getElementById("congrats-screen").style.display = "none";
  startGame(night + 1);
});
document.getElementById("btn-restart-death").addEventListener("click", restartCurrentNight);
document.getElementById("btn-back-to-start").addEventListener("click", goToStart);
document.getElementById("btn-replay").addEventListener("click", () => startGame(1));
document.getElementById("btn-super-back-to-start").addEventListener("click", goToStart);

// Admin panel (hidden button)
document.getElementById("btn-admin").addEventListener("click", () => {
  document.getElementById("admin-modal").classList.add("open");
  document.getElementById("admin-status").textContent = "Admin access granted.";
});
document.getElementById("btn-admin-close").addEventListener("click", () => {
  document.getElementById("admin-modal").classList.remove("open");
});
document.getElementById("btn-admin-skip-night").addEventListener("click", () => {
  if (!gameOver) nightWin();
});
document.getElementById("btn-admin-infinite-power").addEventListener("click", function() {
  infinitePowerEnabled = !infinitePowerEnabled;
  this.textContent = "Infinite Power: " + (infinitePowerEnabled ? "ON" : "OFF");
});
document.getElementById("btn-admin-freeze-klavs").addEventListener("click", function() {
  freezeKlavsEnabled = !freezeKlavsEnabled;
  this.textContent = "Freeze Klāvs: " + (freezeKlavsEnabled ? "ON" : "OFF");
});
document.getElementById("btn-admin-fill-power").addEventListener("click", () => { power = 100; updateHUD(); });
document.getElementById("btn-admin-reset-klavs").addEventListener("click", () => {
  klavsRoom = 0; klavsMovePressure = 0; klavsDoorTimer = 0; klavsCooldown = 0;
  updateRoomDisplay();
});

// ===== INIT =====
loadSettings();
// Apply saved brightness & volume UI
document.getElementById("settings-volume").value = settings.volume;
document.getElementById("settings-volume-value").textContent = settings.volume + "%";
document.getElementById("settings-brightness").value = settings.brightness;
document.getElementById("settings-brightness-value").textContent = settings.brightness + "%";
document.getElementById("settings-effects-select").value = settings.effects || "normal";
applyBrightnessSetting(settings.brightness);
applyTranslations();
checkUnlocks();
</script>
</body>
</html>
